<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Subtitle Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; color: #fff;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    height: 100vh; display: flex; flex-direction: column;
    justify-content: flex-end; align-items: center;
    overflow: hidden; cursor: none; user-select: none;
  }
  #subtitle-area {
    width: 100%; text-align: center;
    padding: 40px 60px 80px; min-height: 200px;
    display: flex; flex-direction: column;
    justify-content: flex-end; align-items: center;
  }
  #subtitle-text {
    font-size: 42px; font-weight: 400; line-height: 1.4;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
    max-width: 90%; transition: opacity 0.2s ease;
  }
  #subtitle-text.fade { opacity: 0; }
  #timer {
    position: fixed; top: 20px; right: 30px;
    font-size: 18px; color: #444;
    font-variant-numeric: tabular-nums;
  }
  #status {
    position: fixed; top: 20px; left: 30px;
    font-size: 16px; color: #444;
  }
  #progress {
    position: fixed; bottom: 0; left: 0; height: 3px;
    background: #555; transition: width 0.3s linear;
  }
  #counter {
    position: fixed; bottom: 15px; right: 30px;
    font-size: 14px; color: #333;
  }
  #help {
    position: fixed; bottom: 15px; left: 30px;
    font-size: 12px; color: #222;
  }
  .hud-hidden .hud { display: none; }
</style>
</head>
<body>
<div id="subtitle-area"><div id="subtitle-text"></div></div>
<div id="timer" class="hud">00:00:00</div>
<div id="status" class="hud">PAUSED</div>
<div id="progress" class="hud"></div>
<div id="counter" class="hud"></div>
<div id="help" class="hud">Space=play/pause &nbsp; ←→=prev/next &nbsp; PageUp/Down=clicker &nbsp; F=fullscreen &nbsp; H=hide UI</div>
<script>
const subtitles = [{"start": 30000, "end": 32000, "text": "Простите."}, {"start": 46000, "end": 48000, "text": "Маяли."}, {"start": 48000, "end": 50000, "text": "Маялино."}, {"start": 51000, "end": 53000, "text": "Послушай меня."}, {"start": 57000, "end": 59000, "text": "Держи."}, {"start": 61000, "end": 65000, "text": "Ешь, ешь, мой милый."}, {"start": 66000, "end": 69000, "text": "С таким большим пузом."}, {"start": 76000, "end": 78000, "text": "Хороший мальчик."}, {"start": 79000, "end": 81000, "text": "С таким ненасытным взглядом."}, {"start": 82000, "end": 84000, "text": "Ничего не осталось."}, {"start": 87000, "end": 89000, "text": "Хороший мальчик."}, {"start": 90000, "end": 92000, "text": "Хороший мальчик."}, {"start": 96000, "end": 98000, "text": "Мама!"}, {"start": 105000, "end": 108000, "text": "Трудная задачка, да? Ловите быстрее."}, {"start": 115000, "end": 117000, "text": "Последний раз, мальчик."}, {"start": 117000, "end": 119000, "text": "Ладно, время на часах."}, {"start": 125000, "end": 127000, "text": "Кингсли!"}, {"start": 128000, "end": 130000, "text": "Ты влюблён, мальчик?"}, {"start": 130000, "end": 132000, "text": "Я, сэр? Нет, сэр."}, {"start": 132000, "end": 134000, "text": "Рад слышать. Но тогда почему ты не работаешь?"}, {"start": 134000, "end": 135000, "text": "Я как раз собирался..."}, {"start": 135000, "end": 137000, "text": "Где твой циркуль, Кингсли?"}, {"start": 137000, "end": 138000, "text": "В парте, сэр."}, {"start": 138000, "end": 140000, "text": "Тогда доставайте их, мальчики."}, {"start": 140000, "end": 145000, "text": "Смитерс, если бы ты видел, как глупо ты выглядишь, когда так ухмыляешься."}, {"start": 145000, "end": 148000, "text": "Уэзерсби, помогите ему вытряхнуть парту."}, {"start": 150000, "end": 152000, "text": "Войдите."}, {"start": 153000, "end": 156000, "text": "А, Симмонс. У вас сообщение для меня, Симмонс?"}, {"start": 156000, "end": 159000, "text": "Да, сэр. То есть, это для Уэзерсби."}, {"start": 159000, "end": 162000, "text": "Его вызывает директор. Прямо сейчас, сэр."}, {"start": 162000, "end": 164000, "text": "Большое спасибо."}, {"start": 175000, "end": 177000, "text": "Войдите."}, {"start": 184000, "end": 186000, "text": "Войдите."}, {"start": 187000, "end": 189000, "text": "А, Уэзерсби, входите."}, {"start": 194000, "end": 196000, "text": "Садитесь."}, {"start": 201000, "end": 203000, "text": "С тригонометрией всё в порядке?"}, {"start": 203000, "end": 205000, "text": "Да, сэр."}, {"start": 212000, "end": 217000, "text": "Мне звонила твоя тётя, Джером."}, {"start": 218000, "end": 220000, "text": "Боюсь, у меня плохие новости для тебя."}, {"start": 222000, "end": 224000, "text": "Да, сэр."}, {"start": 224000, "end": 228000, "text": "Твой отец попал в аварию."}, {"start": 229000, "end": 231000, "text": "Да, сэр."}, {"start": 233000, "end": 236000, "text": "Ты знаешь, что твой отец был в Неаполе?"}, {"start": 236000, "end": 238000, "text": "Да, сэр."}, {"start": 238000, "end": 241000, "text": "Твоя тётя получила известие из больницы сегодня."}, {"start": 241000, "end": 243000, "text": "О."}, {"start": 244000, "end": 246000, "text": "Это был несчастный случай на улице."}, {"start": 246000, "end": 248000, "text": "Да, сэр."}, {"start": 248000, "end": 250000, "text": "А!"}, {"start": 250000, "end": 252000, "text": "А!"}, {"start": 252000, "end": 254000, "text": "А!"}, {"start": 254000, "end": 256000, "text": "А!"}, {"start": 256000, "end": 258000, "text": "А!"}, {"start": 258000, "end": 260000, "text": "А!"}, {"start": 260000, "end": 262000, "text": "А!"}, {"start": 262000, "end": 264000, "text": "А!"}, {"start": 273000, "end": 276000, "text": "Боюсь, твой отец был очень серьёзно ранен."}, {"start": 276000, "end": 278000, "text": "Да, сэр."}, {"start": 278000, "end": 281000, "text": "Собственно, он скончался вчера."}, {"start": 282000, "end": 284000, "text": "Совершенно без боли."}, {"start": 284000, "end": 287000, "text": "Его застрелили? В сердце?"}, {"start": 288000, "end": 290000, "text": "Никто его не стрелял, Джером."}, {"start": 290000, "end": 292000, "text": "На него упала свинья."}, {"start": 299000, "end": 302000, "text": "Твой отец шёл по улице в Неаполе,"}, {"start": 302000, "end": 304000, "text": "когда на него упала свинья."}, {"start": 304000, "end": 306000, "text": "Ужасный несчастный случай."}, {"start": 306000, "end": 308000, "text": "Оказывается, в бедных кварталах Неаполя"}, {"start": 308000, "end": 310000, "text": "свиней держат на балконах."}, {"start": 310000, "end": 312000, "text": "Эта была на пятом этаже."}, {"start": 312000, "end": 314000, "text": "Она слишком разжирела."}, {"start": 314000, "end": 316000, "text": "Балкон обрушился."}, {"start": 316000, "end": 318000, "text": "Свинья упала на твоего отца."}, {"start": 318000, "end": 320000, "text": "А что случилось со свиньёй?"}, {"start": 330000, "end": 332000, "text": "Вот ведь проблема."}, {"start": 332000, "end": 334000, "text": "Чепуха."}, {"start": 334000, "end": 336000, "text": "Полная чепуха."}, {"start": 338000, "end": 340000, "text": "Я просто должен был рассказать им, и когда я сообщил"}, {"start": 340000, "end": 342000, "text": "все подробности того, что произошло,"}, {"start": 342000, "end": 344000, "text": "реакция была самая необычная,"}, {"start": 344000, "end": 346000, "text": "самая необычная реакция."}, {"start": 346000, "end": 348000, "text": "Он спросил меня, э-э..."}, {"start": 348000, "end": 350000, "text": "что случилось со свиньёй?"}, {"start": 350000, "end": 352000, "text": "Что случилось со свиньёй?"}, {"start": 352000, "end": 354000, "text": "Да."}, {"start": 354000, "end": 356000, "text": "И где же она была?"}, {"start": 356000, "end": 358000, "text": "О, Боже."}, {"start": 358000, "end": 360000, "text": "Обычно ведь в такие моменты не считают, правда?"}, {"start": 360000, "end": 362000, "text": "Не знаю, плачете ли вы."}, {"start": 362000, "end": 364000, "text": "Я скорее склонна к тяжёлым раздумьям."}, {"start": 366000, "end": 368000, "text": "Пять пятнадцать."}, {"start": 368000, "end": 370000, "text": "Ты неровно их держишь."}, {"start": 370000, "end": 372000, "text": "Четыре пятнадцать."}, {"start": 372000, "end": 374000, "text": "Почему всё время пятнадцать?"}, {"start": 374000, "end": 376000, "text": "Просто так."}, {"start": 376000, "end": 378000, "text": "Ну..."}, {"start": 378000, "end": 380000, "text": "Спорю, они ненастоящие, Сильвер."}, {"start": 380000, "end": 382000, "text": "Нет, настоящие."}, {"start": 382000, "end": 384000, "text": "Это папины."}, {"start": 384000, "end": 386000, "text": "Шесть пятнадцать."}, {"start": 386000, "end": 388000, "text": "О Боже. Репетиция же."}, {"start": 388000, "end": 390000, "text": "Придётся бежать."}, {"start": 390000, "end": 392000, "text": "Не могу."}, {"start": 392000, "end": 394000, "text": "Не с этими."}, {"start": 394000, "end": 396000, "text": "Могу уронить."}, {"start": 396000, "end": 398000, "text": "Тогда держи в руке."}, {"start": 398000, "end": 400000, "text": "Ничего не будет?"}, {"start": 400000, "end": 402000, "text": "Я бы покончил с собой,"}, {"start": 402000, "end": 404000, "text": "если бы такое случилось с моим отцом."}, {"start": 404000, "end": 406000, "text": "Представь. Убит свиньёй."}, {"start": 406000, "end": 408000, "text": "Никому не рассказывай."}, {"start": 408000, "end": 410000, "text": "Пожалуйста."}, {"start": 410000, "end": 412000, "text": "Ты обещал"}, {"start": 412000, "end": 414000, "text": "никогда об этом не упоминать."}, {"start": 414000, "end": 416000, "text": "Это секрет."}, {"start": 416000, "end": 418000, "text": "Слушай, дай часы мне."}, {"start": 418000, "end": 420000, "text": "Я их не уроню и ничего с ними не случится."}, {"start": 420000, "end": 422000, "text": "Нам надо бежать."}, {"start": 424000, "end": 426000, "text": "Знаю, что сделаю."}, {"start": 430000, "end": 432000, "text": "Ты не должен никому рассказывать."}, {"start": 432000, "end": 434000, "text": "Никогда."}, {"start": 450000, "end": 452000, "text": "Слышали историю"}, {"start": 452000, "end": 454000, "text": "про Уэзерсби?"}, {"start": 460000, "end": 462000, "text": "Это ведь не ты наябедничал, Уэзерсби?"}, {"start": 462000, "end": 464000, "text": "Или мне сказать — свинья?"}, {"start": 464000, "end": 466000, "text": "Почему свинья?"}, {"start": 466000, "end": 468000, "text": "Почему ябеда?"}, {"start": 484000, "end": 486000, "text": "Кто тебе рассказал?"}, {"start": 486000, "end": 488000, "text": "Кто тебе рассказал? Я хочу знать."}, {"start": 490000, "end": 492000, "text": "Я не свинья."}, {"start": 492000, "end": 494000, "text": "Может, ты и ябеда, Уэзерсби."}, {"start": 494000, "end": 496000, "text": "Нет."}, {"start": 496000, "end": 498000, "text": "Если это не он, оставьте бедную свинью в покое."}, {"start": 498000, "end": 500000, "text": "Я хочу знать."}, {"start": 500000, "end": 502000, "text": "Ты ведь не думаешь всерьёз, что кто-то может хранить такой секрет?"}, {"start": 502000, "end": 504000, "text": "Кстати, Уэзерсби,"}, {"start": 504000, "end": 506000, "text": "несколько ребят из спальни"}, {"start": 506000, "end": 508000, "text": "жаловались на твой запах."}, {"start": 508000, "end": 510000, "text": "От меня не пахнет."}, {"start": 510000, "end": 512000, "text": "Советую избегать малейшего запаха."}, {"start": 512000, "end": 514000, "text": "А то твоя кличка станет ещё популярнее, бедняга."}, {"start": 514000, "end": 516000, "text": "Бей его, Гарт! Давай!"}, {"start": 516000, "end": 518000, "text": "Давай же! Ну!"}, {"start": 518000, "end": 520000, "text": "Давай, Энди!"}, {"start": 520000, "end": 522000, "text": "Вперёд, Энди!"}, {"start": 522000, "end": 524000, "text": "Бей его!"}, {"start": 524000, "end": 526000, "text": "Давай, Энди!"}, {"start": 526000, "end": 528000, "text": "Свет!"}, {"start": 528000, "end": 530000, "text": "Отбой."}, {"start": 538000, "end": 540000, "text": "Ладно. Спокойной ночи."}, {"start": 540000, "end": 542000, "text": "Ладно. Спокойной ночи."}, {"start": 548000, "end": 550000, "text": "Замолчи, Уэзерсби."}, {"start": 554000, "end": 556000, "text": "Я сказал — отбой, Портер."}, {"start": 556000, "end": 558000, "text": "И чтоб тишина."}, {"start": 570000, "end": 572000, "text": "."}, {"start": 590000, "end": 592000, "text": "Могила мамы прекрасно выглядит весной"}, {"start": 592000, "end": 594000, "text": "со всем цветением и свежим морским бризом."}, {"start": 594000, "end": 596000, "text": "Ты помнишь витраж в церкви,"}, {"start": 596000, "end": 598000, "text": "который разбился во время шторма прошлым летом?"}, {"start": 598000, "end": 603700, "text": "Великолепно. Я так рада, что тебе нравится Демосфен. Помню, когда мне было"}, {"start": 603700, "end": 607500, "text": "столько лет, сколько тебе, я была в восторге, узнав, что в древних Афинах были аристократические"}, {"start": 607500, "end": 610500, "text": "уличные банды."}, {"start": 628000, "end": 635000, "text": "Тётя Джойс? Не сейчас, Джером. Я занята."}, {"start": 635000, "end": 644000, "text": "Я только хотел узнать, почему отец держит зонт. Это не зонт."}, {"start": 644000, "end": 650500, "text": "Это зонтик от солнца. Твой отец был весьма опытным путешественником. А он всегда был"}, {"start": 650500, "end": 655800, "text": "в костюме, когда загорал? И прекрасным писателем. Помню, когда «Прогулки по"}, {"start": 655800, "end": 661200, "text": "Балеарским островам» впервые опубликовали, в «Таймс Литерари Сапплмент» написали, что на каждой странице"}, {"start": 661200, "end": 667300, "text": "можно почувствовать запах моря. Или это был «Иллюстрейтед Лондон Ньюс»?"}, {"start": 667300, "end": 675300, "text": "Я пригласила и Аманду тоже. Она тебе ведь нравится, правда?"}, {"start": 675300, "end": 680300, "text": "Давай же. Открой дверь. Джером?"}, {"start": 686300, "end": 702300, "text": "Ненавижу чай. Чай? Я бы не говорила, если бы не ненавидела. Вспомнила. Это был «Курьер»."}, {"start": 702300, "end": 710300, "text": "Что? Тот запах — на каждой странице чувствовался песок. Песок? Море, Стивен. Море."}, {"start": 710300, "end": 715300, "text": "Мой брат оформил мне подписку. Такой милый маленький журнал, помещался"}, {"start": 715300, "end": 723800, "text": "в дамскую сумочку. Ваш брат? Отец Джерома. Такой внимательный и практичный."}, {"start": 723800, "end": 733800, "text": "Правда? Я мальчиков тоже ненавижу. Помню, я заплатил две тысячи лир за минеральную воду"}, {"start": 733800, "end": 740800, "text": "в Калабрии однажды. Хотя, должен сказать, закаты там были поистине великолепны."}, {"start": 740800, "end": 748300, "text": "Ужасный несчастный случай. Правда? Не представляю, как такое может быть допустимо в"}, {"start": 748300, "end": 755300, "text": "цивилизованной стране. Хотя, наверное, Италию следует считать цивилизованной. За границей"}, {"start": 755300, "end": 761300, "text": "ко всему нужно быть готовым, разумеется. И мой брат был великим путешественником."}, {"start": 761300, "end": 768800, "text": "Он ведь писал книги? Они все у меня есть. Знаете, он был таким осторожным человеком."}, {"start": 768800, "end": 774800, "text": "Что вы ненавидите? Во всех отношениях. Но кто мог предположить, что когда он"}, {"start": 774800, "end": 778800, "text": "шёл по виа Витторио Эмануэле Пануччи по пути в гидрографический"}, {"start": 778800, "end": 784800, "text": "музей, на него упадёт свинья? Что?"}, {"start": 790800, "end": 796800, "text": "И чем вы планируете заняться после школы? Ну, у меня неплохо с цифрами,"}, {"start": 796800, "end": 800800, "text": "вообще-то. Я мог бы пойти в бухгалтерию."}, {"start": 800800, "end": 829800, "text": "Всё дело в рисках, не правда ли? И в том, как их рассчитать. Если ты не"}, {"start": 829800, "end": 835800, "text": "знаешь вероятности, невозможно определить результат. Бренда вот знает счёт, правда,"}, {"start": 835800, "end": 842800, "text": "Бренда? О нет. Ненавижу крикет. Она-то знает счёт. Нравятся ваши цифры,"}, {"start": 842800, "end": 850800, "text": "Джером? Да, спасибо. А Бренды нравятся? Бренды что? Её фигура."}, {"start": 850800, "end": 864800, "text": "Почему ты красишь ногти в лиловый, Бренда? Потому что это подходит к моим глазам. Правда ведь подходит"}, {"start": 864800, "end": 871800, "text": "к моим глазам, мистер Уэзерсби? Бренда, подойдите сюда на минутку, пожалуйста."}, {"start": 871800, "end": 877800, "text": "Вот ваш шанс, Бренда. Оставляю вас. Вот печатная работа. Если бы вы могли"}, {"start": 877800, "end": 881800, "text": "расположить цифры в две колонки — одну слева, другую справа — и"}, {"start": 881800, "end": 886800, "text": "итог вот здесь, и три копии. Да, мы могли бы пообедать, пока они сохнут,"}, {"start": 886800, "end": 898800, "text": "и я не против задержаться допоздна. У меня назначена встреча. Не хотите ли присесть?"}, {"start": 898800, "end": 906800, "text": "С удовольствием. О, эта скамейка, кажется, шатается. Я обожаю шаткие скамейки."}, {"start": 906800, "end": 921800, "text": "И деревья. Да, мне нравятся деревья. И малыши. Малыши просто прелесть. Правда? Вам нравятся дети?"}, {"start": 921800, "end": 928800, "text": "О да. Большинство мужчин — нет. По крайней мере, не признаются. Наверное, вы думаете, я"}, {"start": 928800, "end": 932800, "text": "довольно глупая и хотите поговорить о чём-нибудь вроде бухгалтерии или гольфа. Ну,"}, {"start": 932800, "end": 937800, "text": "бухгалтерия многому учит в жизни. Как? Ну, если посмотреть на"}, {"start": 937800, "end": 941800, "text": "цифры, становится ясно, что сейчас самое время для таких людей, как"}, {"start": 941800, "end": 945800, "text": "мы, задуматься о создании семьи. Я думаю, на самом деле..."}, {"start": 945800, "end": 957800, "text": "И цифры могут это подсказать? Вы уверены, что скамейка не шатается? Мы можем пересесть на другую, если хотите. Если вы не против."}, {"start": 957800, "end": 969800, "text": "Конечно нет. Она и правда шаталась, да? Знаете, Джером, вы совсем не такой, каким я вас представляла. Вы гораздо спокойнее и с вами легко разговаривать. Хорошо."}, {"start": 970800, "end": 974800, "text": "А когда вы убедите меня, что цифры могут объяснить всё... Ну, не"}, {"start": 974800, "end": 979800, "text": "абсолютно всё. Я хотела бы, чтобы вы рассказали мне о своей семье."}, {"start": 985800, "end": 990800, "text": "Я когда-нибудь рассказывал вам о своём отце? Нет."}, {"start": 990800, "end": 1009800, "text": "Его убила свинья. Правда, Джером? В Индии? Нет. В Италии. Я и не знала, что в Италии охотятся на кабанов с копьём. Ваш отец увлекался поло?"}, {"start": 1020800, "end": 1037800, "text": "Это вино ужасно старое, дорогой. Наверное, стоило целое состояние. Ой, простите, я забыла вот это. Дайте положу. Спасибо. На вас не похоже — что-то забыть. Можно тебя поцеловать? Ой, да, конечно."}, {"start": 1051800, "end": 1071800, "text": "У тебя есть книги твоего отца, Джимми? У тёти Джойс есть полные собрания. «Солнце и тень», «Уголки и закоулки» и, конечно, «Прогулки по Балеарским островам». Но у меня все его открытки. Он присылал мне по одной отовсюду, где побывал. Говорят, они теперь довольно ценные. Ты бы не продал какие-нибудь? О нет, конечно нет."}, {"start": 1072800, "end": 1094800, "text": "Посмотри. Это часы, он завещал их мне, и они показывают время с точностью до секунды. Видишь, их ни разу не ремонтировали с тех пор. Должно быть, это было ужасно. Не представляю, каково потерять кого-то, когда тебе двенадцать. Девять. Прости, я не знала, Джимми. Это, наверное, было ужасно."}, {"start": 1095800, "end": 1117800, "text": "Я был в школе, когда мне сообщили. Ты тяжело это перенёс? Не помню. Я никогда никого не теряла. Бедный Джимми, ты и маму потерял. Прости, я ужасно бестактна и эгоистична. Нет, что ты. Что ты."}, {"start": 1118800, "end": 1136800, "text": "Ты так и не рассказал, как умер твой отец. Это был несчастный случай на улице. О Боже. Это было... Ни слова больше, дорогой. Я ужасно себя вела, задавая все эти вопросы. Давай есть."}, {"start": 1137800, "end": 1153800, "text": "Нет, Салли, я хочу рассказать. Томас, ты ведь никогда не будешь ездить быстро? У нас будет много детей, огромный дом с большим садом и прудом с утками, и утки повсюду, и лилии, и два ослика."}, {"start": 1153800, "end": 1163800, "text": "Его убила свинья. Правда, Джером? В Индии? Нет, в Италии. Я и не знала, что в Италии охотятся на кабанов с копьём. Ваш отец увлекался поло?"}, {"start": 1163800, "end": 1186800, "text": "Джимми? Джимми, дорогой? Ты задумался. Прости, я вспоминал о том, что случилось давным-давно."}, {"start": 1223800, "end": 1251800, "text": "Всё на месте? Да. Это отец Джимми? Да, дорогая. Как ты догадалась? У него глаза Джимми, правда? Совершенно верно. Знаете, я раньше этого не замечала. Какая вы наблюдательная."}, {"start": 1251800, "end": 1268800, "text": "Присядем? Чай остывает. Салли, садитесь сюда. Спасибо. Не против разлить чай, Джером?"}, {"start": 1268800, "end": 1284800, "text": "Было бы мило, если бы вы остались на ужин, Салли. У нас свинина, надеюсь, вы не возражаете. И ещё... Джером давал вам книги своего отца? Нет, пока нет. Я подарю вам полное собрание сочинений на свадьбу. Спасибо."}, {"start": 1284800, "end": 1311800, "text": "Он так нежно писал о своих путешествиях. Моя любимая, пожалуй, — «Уголки и закоулки». У него было бы великое будущее. Можно мне сэндвич? Спасибо. Тот ужасный несчастный случай сделал всё ещё печальнее. Да? Да. Я получила столько писем от его читателей после того, как на него упала свинья."}, {"start": 1311800, "end": 1321800, "text": "Это было в Неаполе. Он шёл по виа Витторио Эмануэле Пануччи по пути в гидрографи..."}, {"start": 1321800, "end": 1330800, "text": "Мама! Я вернулся!"}, {"start": 1330800, "end": 1356800, "text": "Как ужасно. Заставляет задуматься, правда? Вот так, ни с того ни с сего."}, {"start": 1356800, "end": 1376800, "text": "О чём задумался? Интересно, что случилось со свиньёй. Наверное, её съели на ужин."}, {"start": 1446800, "end": 1469800, "text": "Спасибо за просмотр!"}];

let currentIndex = -1, isPlaying = false, startTime = 0, elapsed = 0, timerInterval = null;
const subtitleText = document.getElementById('subtitle-text');
const timerEl = document.getElementById('timer');
const statusEl = document.getElementById('status');
const progressEl = document.getElementById('progress');
const counterEl = document.getElementById('counter');
const totalMs = subtitles.length ? subtitles[subtitles.length - 1].end : 1;

function fmt(ms) {
  const s = Math.floor(ms / 1000);
  return [s / 3600 | 0, (s % 3600) / 60 | 0, s % 60].map(v => String(v).padStart(2, '0')).join(':');
}

function updateCounter() {
  counterEl.textContent = (currentIndex >= 0 ? (currentIndex + 1) : '—') + ' / ' + subtitles.length;
}
updateCounter();

function showSub(i) {
  subtitleText.classList.add('fade');
  setTimeout(() => { subtitleText.textContent = subtitles[i].text; subtitleText.classList.remove('fade'); }, 100);
}

function tick() {
  const ms = elapsed + (Date.now() - startTime);
  timerEl.textContent = fmt(ms);
  let found = -1;
  for (let i = 0; i < subtitles.length; i++) {
    if (ms >= subtitles[i].start && ms < subtitles[i].end) { found = i; break; }
  }
  if (found >= 0 && found !== currentIndex) {
    currentIndex = found; showSub(currentIndex); updateCounter();
  } else if (found < 0 && currentIndex >= 0 && ms >= subtitles[currentIndex].end) {
    subtitleText.textContent = '';
  }
  progressEl.style.width = Math.min(100, ms / totalMs * 100) + '%';
}

function togglePlay() {
  if (isPlaying) {
    elapsed += Date.now() - startTime;
    isPlaying = false; clearInterval(timerInterval);
    statusEl.textContent = 'PAUSED';
  } else {
    startTime = Date.now(); isPlaying = true;
    statusEl.textContent = '▶ PLAYING';
    timerInterval = setInterval(tick, 50);
  }
}

function goTo(i) {
  i = Math.max(0, Math.min(subtitles.length - 1, i));
  const wasPlaying = isPlaying;
  if (isPlaying) clearInterval(timerInterval);
  currentIndex = i; elapsed = subtitles[i].start;
  showSub(i); updateCounter(); timerEl.textContent = fmt(elapsed);
  if (wasPlaying) { startTime = Date.now(); timerInterval = setInterval(tick, 50); }
}

document.addEventListener('keydown', e => {
  switch (e.code) {
    case 'Space': case 'F5': e.preventDefault(); togglePlay(); break;
    case 'ArrowRight': case 'PageDown': case 'KeyN': e.preventDefault(); goTo(currentIndex + 1); break;
    case 'ArrowLeft': case 'PageUp': case 'KeyP': e.preventDefault(); goTo(currentIndex <= 0 ? 0 : currentIndex - 1); break;
    case 'KeyF': e.preventDefault();
      document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
      break;
    case 'KeyH': e.preventDefault();
      document.body.classList.toggle('hud-hidden');
      break;
  }
});

let ct; document.addEventListener('mousemove', () => {
  document.body.style.cursor = 'default'; clearTimeout(ct);
  ct = setTimeout(() => document.body.style.cursor = 'none', 2000);
});
</script>
